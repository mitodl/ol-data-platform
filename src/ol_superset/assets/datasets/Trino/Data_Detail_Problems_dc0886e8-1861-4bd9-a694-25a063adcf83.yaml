sql: "select \na.platform\n, h.course_title\n,a.courserun_readable_id\n,b.problem_name\n\
  ,a.event_type\n,a.answers\n,a.attempt\n,a.success\n,a.grade\n,a.max_grade\n,a.event_timestamp\n\
  ,b.max_attempts\n,b.weight\n,b.markdown\nfrom  ol_warehouse_production_dimensional.tfact_problem_events\
  \ a\ninner join ol_warehouse_production_dimensional.dim_problem b\non a.problem_block_fk=b.problem_block_pk\n\
  inner join ol_warehouse_production_intermediate.int__combined__course_runs as h\n\
  \          on a.courserun_readable_id = h.courserun_readable_id\n\n"
