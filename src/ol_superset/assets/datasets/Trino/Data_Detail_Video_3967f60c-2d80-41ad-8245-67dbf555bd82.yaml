schema: ol_warehouse_production_dimensional
sql: "select a.platform\n,h.course_title\n,a.courserun_readable_id\n,a.event_type\n\
  ,a.video_duration\n,a.video_position\n,a.event_timestamp\n,c.video_name\nfrom  ol_warehouse_production_dimensional.tfact_video_events\
  \ a\ninner join ol_warehouse_production_dimensional.dim_video c\non a.courserun_readable_id=c.courserun_readable_id\n\
  and a.video_block_fk = substring(c.video_block_pk, regexp_position(c.video_block_pk,\
  \ 'block@') + 6)\ninner join ol_warehouse_production_intermediate.int__combined__course_runs\
  \ h\n    on a.courserun_readable_id = h.courserun_readable_id\n\n"
