sql: "select\n    e.platform_fk\n    , e.user_fk\n    , e.platform\n    , e.openedx_user_id\n\
  \    , e.user_username\n    , e.courserun_readable_id\n    , e.event_type\n    ,\
  \ e.block_fk\n    , e.starting_position\n    , e.ending_position\n    , e.event_timestamp\n\
  \    , e.event_json\n    , cr.course_title\nfrom ol_warehouse_production_dimensional.tfact_course_navigation_events\
  \ as e\nleft join (\n    select courserun_readable_id, max(course_title) as course_title\n\
  \    from ol_warehouse_production_intermediate.int__combined__course_runs\n    group\
  \ by courserun_readable_id\n) as cr\n    on e.courserun_readable_id = cr.courserun_readable_id\n"
