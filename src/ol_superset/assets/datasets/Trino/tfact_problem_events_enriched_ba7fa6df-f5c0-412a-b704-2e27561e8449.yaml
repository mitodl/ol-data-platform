table_name: tfact_problem_events_enriched
main_dttm_col: event_timestamp
description: Problem events enriched with problem_name, markdown, max_attempts, weight from dim_problem and course_title from int__combined__course_runs
default_endpoint: null
offset: 0
cache_timeout: null
catalog: ol_data_lake_production
schema: ol_warehouse_production_dimensional
sql: "select\n    e.platform_fk\n    , e.user_fk\n    , e.platform\n    , e.openedx_user_id\n\
  \    , e.user_username\n    , e.courserun_readable_id\n    , e.event_type\n    ,\
  \ e.problem_block_fk\n    , e.grade\n    , e.max_grade\n    , e.attempt\n    , e.answers\n\
  \    , e.success\n    , e.event_timestamp\n    , e.event_json\n    , dp.problem_name\n\
  \    , dp.markdown\n    , dp.max_attempts\n    , dp.weight\n    , cr.course_title\n\
  from ol_warehouse_production_dimensional.tfact_problem_events as e\nleft join ol_warehouse_production_dimensional.dim_problem\
  \ as dp\n    on e.problem_block_fk = dp.problem_block_pk\nleft join (\n    select\
  \ courserun_readable_id, max(course_title) as course_title\n    from ol_warehouse_production_intermediate.int__combined__course_runs\n\
  \    group by courserun_readable_id\n) as cr\n    on e.courserun_readable_id = cr.courserun_readable_id\n"
