schema: ol_warehouse_production_dimensional
sql: "select\n    e.platform_fk\n    , e.user_fk\n    , e.platform\n    , e.openedx_user_id\n\
  \    , e.user_username\n    , e.courserun_readable_id\n    , e.event_type\n    ,\
  \ e.video_block_fk\n    , e.video_duration\n    , e.video_position\n    , e.starting_position\n\
  \    , e.ending_position\n    , e.event_timestamp\n    , e.event_json\n    , v.video_name\n\
  \    , cr.course_title\nfrom ol_warehouse_production_dimensional.tfact_video_events\
  \ as e\nleft join ol_warehouse_production_dimensional.dim_video as v\n    on e.courserun_readable_id\
  \ = v.courserun_readable_id\n    and e.video_block_fk = substring(\n        v.video_block_pk,\n\
  \        regexp_position(v.video_block_pk, 'block@') + 6\n    )\nleft join (\n \
  \   select courserun_readable_id, max(course_title) as course_title\n    from ol_warehouse_production_intermediate.int__combined__course_runs\n\
  \    group by courserun_readable_id\n) as cr\n    on e.courserun_readable_id = cr.courserun_readable_id\n"
