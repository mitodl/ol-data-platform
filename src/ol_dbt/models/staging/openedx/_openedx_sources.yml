---
version: 2

sources:
- name: ol_warehouse_raw_data
  loader: airbyte
  database: '{{ target.database }}'
  schema: '{{ target.schema.replace(var("schema_suffix", ""), "").rstrip("_") }}_raw'
  tables:
  - name: raw__openedx__s3__course_xml_blocks
    description: Comprehensive block-level data extracted from Open edX course XML
      archives, including all course components from the XML structure. Covers mitxonline,
      xpro, and mitx deployments.
    columns:
    - name: course_id
      description: str, course ID formatted as course-v1:{org}+{course}+{run}
    - name: source_system
      description: str, ETL source system identifier (e.g. "mitxonline", "xpro", "mitx")
    - name: block_id
      description: str, unique identifier for the block extracted from XML url_name
        attribute or filename
    - name: block_type
      description: str, category/type of the XML block such as chapter, sequential,
        vertical, video, problem, html, discussion, lti, etc.
    - name: block_display_name
      description: str, display name of the block from the XML display_name attribute
    - name: xml_attributes
      description: json, complete set of XML attributes for the block as a JSON object
    - name: xml_path
      description: str, path to the XML file within the course archive
    - name: raw_xml
      description: str, full raw XML string of the block element, preserved for downstream
        enrichment without requiring reprocessing of archives
    - name: edx_video_id
      description: str, for video blocks, the edX video ID
    - name: duration
      description: str, for video blocks, the duration in seconds
    - name: max_attempts
      description: str, for problem blocks, maximum number of attempts allowed
    - name: weight
      description: str, for problem blocks, the weight/points value
    - name: markdown
      description: str, for problem blocks, markdown content if present
    - name: retrieved_at
      description: timestamp, ISO8601 timestamp when the block data was extracted
