- name: tfact_chatbot_events
  description: Transactional fact table for learner chatbot events in a course
  columns:
  - name: chatbot_source
    description: string, indicates the source of the chatbot event like 'open_edx'
      or 'canvas'
    tests:
    - not_null
  - name: org_id
    description: string, the name of the organization that created the course. e.g.
      MITxT, MITx, UAI_MIT, etc.
    tests:
    - not_null
  - name: user_fk
    description: string, foreign key to dim_user
    tests:
    - not_null
  - name: openedx_user_id
    description: int, user ID on the MIT Learn open edX platform
    tests:
    - not_null
  - name: user_username
    description: str, username of the MIT Learn open edX
    tests:
    - not_null
  - name: courserun_readable_id
    description: string, the open edX course readable ID or canvas course id. May
      be Null for some canvas chatbot events where course info is not captured.
  - name: event_type
    description: string, type of the chatbot event. e.g. ol_openedx_chat.drawer.submit,
      ol_openedx_chat.drawer.response, ol_openedx_chat_xblock.OLChat.submit, ol_openedx_chat_xblock.OLChat.response,
      etc.
    tests:
    - not_null
  - name: session_id
    description: string, unique identifier for the chatbot session
    tests:
    - not_null
  - name: block_id
    description: string, foreign key to dim_course_content, referencing the block
      ID of the page where the chatbot event occurred. e.g. block-v1:{org}+{course}+{run}type@vertical+block@{hash
      code}.
  - name: block_name
    description: string, name of the content block where the chatbot event occurred.
  - name: chatbot_type
    description: string, type of the chatbot. e.g. Syllabus, Tutor, etc.
  - name: event_value
    description: string, the value of the event, e.g. the message submitted by the
      learner or the response from the chatbot. For other event type such as tabchange,
      it is string indicating which tab the user switched to.
  - name: event_json
    description: json, it includes member fields that identify specifics of each triggered
      event.
  - name: event_timestamp_iso8601
    description: string, the raw ISO 8601 timestamp string from the source tracking
      log, in the platform's local timezone. Used as the basis for time_fk and date_fk.
  - name: event_timestamp
    description: timestamp, timestamp (with time zone) indicating the time at which
      the event occurred
    tests:
    - not_null
  - name: time_fk
    description: integer, foreign key to dim_time in HHMM format (e.g. 1430 = 14:30).
      Derived from event_timestamp_iso8601 (local timezone of the source data).
  - name: date_fk
    description: integer, foreign key to dim_date in YYYYMMDD format (e.g. 20230617).
      Derived from event_timestamp_iso8601 (local timezone of the source data).
  - name: learn_ai_thread_id
    description: string, unique identifier for the chat thread in the Learn AI database.
  - name: learn_ai_checkpoint_pk
    description: int, foreign key to chatbots_djangocheckpoint in Learn AI database
  - name: platform_fk
    description: string, foreign key to dim_platform, referencing the platform where
      the chatbot event occurred

- name: dim_discount
  description: Dimension table combining discount/coupon records across MITxOnline
    and MITxPro platforms. Each row represents a unique discount or coupon identified
    by a surrogate key derived from the source platform and source discount ID.
  columns:
  - name: discount_pk
    description: string, surrogate primary key for this table, generated from source_discount_id
      and platform_code
    tests:
    - not_null
    - unique
  - name: platform_code
    description: string, code identifying the source platform. e.g. mitxonline, mitxpro
    tests:
    - not_null
  - name: source_discount_id
    description: integer, original discount or coupon ID from the source platform
  - name: discount_code
    description: string, the discount or coupon code used at checkout
  - name: discount_type
    description: string, type of discount. e.g. percent-off, dollars-off, fixed-price
  - name: discount_amount
    description: decimal, numeric amount of the discount (percentage or dollar value
      depending on discount_type). For percent-off discounts, this is a number between
      0 and 100 representing the percentage
  - name: discount_source
    description: string, source or payment type of the discount. e.g. marketing, b2b,
      financial-assistance
  - name: max_redemptions
    description: integer, maximum number of times this discount may be redeemed. 0
      if unlimited.
  - name: redemption_type
    description: string, redemption constraint type. e.g. one-time, unlimited
  - name: activated_on
    description: string, ISO-8601 timestamp indicating when the discount becomes active
  - name: expires_on
    description: string, ISO-8601 timestamp indicating when the discount expires
  - name: created_on
    description: string, ISO-8601 timestamp indicating when the discount record was
      created
  - name: updated_on
    description: string, ISO-8601 timestamp indicating when the discount record was
      last updated

- name: dim_tax_rate
  description: Dimension table of tax rates by country. Each row represents the tax
    rate for a single country, identified by a surrogate key derived from the country
    code.
  columns:
  - name: tax_rate_pk
    description: string, surrogate primary key generated from country_code
    tests:
    - not_null
    - unique
  - name: country_code
    description: string, ISO 3166-1 alpha-2 country code this tax rate applies to.
      Unique per country
    tests:
    - not_null
    - unique
  - name: tax_rate
    description: numeric, the tax rate as a percentage (e.g. 15 means 15%)
    tests:
    - not_null
  - name: tax_rate_name
    description: string, name of the tax assessed (e.g. GST)
    tests:
    - not_null
  - name: is_active
    description: boolean, indicates whether this tax rate is currently active
    tests:
    - not_null

- name: dim_time
  description: >
    Minute-grain time dimension (1,440 rows) for sub-daily analysis. Each row
    represents one minute of the day. Join fact table timestamp columns to
    time_key using the HHMM integer (hour * 100 + minute).
  columns:
  - name: time_key
    description: >
      Integer primary key in HHMM format (e.g. 1430 = 14:30 / 2:30 PM).
      Range 0–2359. Join target for fact tables.
    tests:
    - unique
    - not_null
  - name: hour
    description: Hour of the day in 24-hour format (0–23)
    tests:
    - not_null
  - name: minute
    description: Minute of the hour (0–59)
    tests:
    - not_null
  - name: minute_of_day
    description: >
      Minutes elapsed since midnight (0–1439). Useful for arithmetic such as
      computing the difference between two intra-day times.
    tests:
    - not_null
  - name: am_pm
    description: Meridiem indicator — 'AM' (hours 0–11) or 'PM' (hours 12–23)
    tests:
    - not_null
  - name: hour_12
    description: Hour in 12-hour clock format (1–12)
    tests:
    - not_null
  - name: hour_of_day_label
    description: >
      Human-readable time label in 12-hour format (e.g. '02:30 PM').
      Suitable for display in dashboards.
    tests:
    - not_null
  - name: time_of_day_bucket
    description: >
      Broad time-of-day category based on the 24-hour hour value.
      Night: 0–5, Morning: 6–11, Afternoon: 12–17, Evening: 18–23.
    tests:
    - not_null
    - accepted_values:
        values: ['Night', 'Morning', 'Afternoon', 'Evening']
