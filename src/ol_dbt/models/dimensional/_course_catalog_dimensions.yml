---
version: 2

models:
- name: dim_instructor
  description: Instructor dimension containing faculty and course instructors from
    all platforms. Grain is (instructor_source_id, or instructor_name when no source
    id exists, primary_platform). mitxonline (wagtail_page_id) and ocw (course_instructor_uuid)
    have a stable per-instructor natural key and dedupe on it, so two distinct instructors
    sharing a name on the same platform are kept as separate rows. mitxpro's source
    data has no such key; its instructors still dedupe on name alone, so two distinct
    mitxpro faculty sharing an exact name will collapse into a single row — an accepted,
    documented limitation rather than a fix.
  columns:
  - name: instructor_pk
    description: Primary key - surrogate key generated from (instructor_source_id,
      or instructor_name when no source id exists, primary_platform)
    tests:
    - unique
    - not_null
  - name: instructor_source_id
    description: Platform-native stable identifier for the instructor (wagtail_page_id
      for mitxonline, course_instructor_uuid for ocw). Null for mitxpro, which has
      no such identifier in its source data.
  - name: instructor_name
    description: Full name of the instructor
    tests:
    - not_null
  - name: instructor_title
    description: Academic or professional title (e.g., "Professor", "Lecturer")
  - name: instructor_bio_short
    description: Short biographical description
  - name: instructor_bio_long
    description: Full biographical description in HTML format
  - name: primary_platform
    description: Platform where this instructor record originates

- name: dim_topic
  description: Topic taxonomy dimension with hierarchical structure. Grain is (topic_name,
    primary_platform) — same topic name from different platforms are kept as separate
    rows with platform-scoped parent-child relationships.
  columns:
  - name: topic_pk
    description: Primary key - surrogate key generated from (topic_name, primary_platform)
    tests:
    - unique
    - not_null
  - name: topic_name
    description: Topic or subject area name
    tests:
    - not_null
  - name: parent_topic_fk
    description: Self-referencing FK to parent topic within the same platform
  - name: parent_topic_name
    description: string, display name of the parent topic in the hierarchy; null for
      top-level topics
  - name: primary_platform
    description: Platform where this topic record originates

- name: dim_department
  description: MIT department dimension. Grain is (department_name, primary_platform)
    — same department name from different platforms are kept as separate rows.
  columns:
  - name: department_pk
    description: Primary key - surrogate key generated from (department_name, primary_platform)
    tests:
    - unique
    - not_null
  - name: department_name
    description: Full department name
    tests:
    - not_null
  - name: department_number
    description: MIT department number (e.g., "6" for EECS, "18" for Math)
  - name: primary_platform
    description: Platform where this department record originates
