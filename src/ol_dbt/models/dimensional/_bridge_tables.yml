---
version: 2

models:
- name: bridge_user_courserun_role
  description: >
    User to course run roles bridge across all platforms. Links users to course runs
    via their course access roles (e.g. instructor, staff, beta_testers).
    Grain: one row per (user, course_run, role).
  tests:
  - dbt_utils.unique_combination_of_columns:
      combination_of_columns:
      - user_fk
      - courserun_readable_id
      - courseaccess_role
  columns:
  - name: user_fk
    description: Foreign key to dim_user.user_pk.
    tests:
    - not_null
    - relationships:
        to: ref('dim_user')
        field: user_pk
  - name: courserun_fk
    description: Foreign key to dim_course_run.courserun_pk. Null when the course
      run does not exist in dim_course_run.
    tests:
    - relationships:
        to: ref('dim_course_run')
        field: courserun_pk
  - name: courserun_readable_id
    description: Human-readable course run identifier from the source system. Preserved
      for rows where courserun_fk is null.
    tests:
    - not_null
  - name: platform_code
    description: Platform identifier code (e.g. mitxonline, edxorg, mitxpro, residential)
      for the course run.
    tests:
    - not_null
  - name: courseaccess_role
    description: The role assigned to the user for this course run (e.g. instructor,
      staff, beta_testers, finance_admin, sales_admin).
    tests:
    - not_null

- name: bridge_program_course
  description: >
    Many-to-many bridge table connecting programs to their required courses.
    Allows analysis of program composition and cross-program course sharing.
  tests:
    # Ensure no duplicate program-course pairs
  - dbt_utils.unique_combination_of_columns:
      combination_of_columns:
      - program_fk
      - course_fk
  columns:
  - name: program_fk
    description: Foreign key to dim_program
    tests:
    - not_null
    - relationships:
        to: ref('dim_program')
        field: program_pk
  - name: course_fk
    description: Foreign key to dim_course
    tests:
    - not_null
    - relationships:
        to: ref('dim_course')
        field: course_pk
  - name: is_required
    description: Boolean indicating if course is required for program completion
    tests:
    - not_null
  - name: course_order
    description: Sequence/order of course within program curriculum

- name: bridge_course_instructor
  description: Many-to-many relationship between courses and instructors
  columns:
  - name: course_fk
    description: Foreign key to dim_course
    tests:
    - not_null
    - relationships:
        to: ref('dim_course')
        field: course_pk
  - name: instructor_fk
    description: Foreign key to dim_instructor
    tests:
    - not_null
    - relationships:
        to: ref('dim_instructor')
        field: instructor_pk
  tests:
  - dbt_utils.unique_combination_of_columns:
      combination_of_columns:
      - course_fk
      - instructor_fk

- name: bridge_course_topic
  description: Many-to-many relationship between courses and topics
  columns:
  - name: course_fk
    description: Foreign key to dim_course
    tests:
    - not_null
    - relationships:
        to: ref('dim_course')
        field: course_pk
  - name: topic_fk
    description: Foreign key to dim_topic
    tests:
    - not_null
    - relationships:
        to: ref('dim_topic')
        field: topic_pk
  tests:
  - dbt_utils.unique_combination_of_columns:
      combination_of_columns:
      - course_fk
      - topic_fk

- name: bridge_course_department
  description: Many-to-many relationship between courses and departments
  columns:
  - name: course_fk
    description: Foreign key to dim_course
    tests:
    - not_null
    - relationships:
        to: ref('dim_course')
        field: course_pk
  - name: department_fk
    description: Foreign key to dim_department
    tests:
    - not_null
    - relationships:
        to: ref('dim_department')
        field: department_pk
  tests:
  - dbt_utils.unique_combination_of_columns:
      combination_of_columns:
      - course_fk
      - department_fk

- name: bridge_user_organization
  description: >
    MITx Online B2B user-to-organization membership bridge.
    Grain: one row per (user, organization) membership.
  tests:
  - dbt_utils.unique_combination_of_columns:
      combination_of_columns:
      - user_fk
      - organization_fk
  columns:
  - name: user_fk
    description: Foreign key to dim_user.user_pk.
    tests:
    - not_null
    - relationships:
        to: ref('dim_user')
        field: user_pk
  - name: organization_fk
    description: Foreign key to dim_organization.organization_pk.
    tests:
    - not_null
    - relationships:
        to: ref('dim_organization')
        field: organization_pk
  - name: userorganization_keep_until_seen
    description: If true, the user is retained in the organization until their SSO
      data is next observed.
  - name: userorganization_is_manager
    description: If true, the user is a manager of this organization and can access
      organization dashboard features.

- name: bridge_user_account_link
  description: >
    Edges between platform-specific user accounts, independent of dim_user's
    own identity-collapsing. from_platform = to_platform is a
    same-platform redirect from an old account to its canonical replacement
    (derived from mitxonline audit history) -- a redirect to follow. Different
    platforms is a cross-platform co-reference (e.g. a MITx Online account's
    linked edX.org account) -- not a redirect. Grain: one row per
    (from_platform, from_user_id, to_platform).
  tests:
  - dbt_utils.unique_combination_of_columns:
      combination_of_columns:
      - from_platform
      - from_user_id
      - to_platform
  columns:
  - name: from_platform
    description: Platform identifier of the source account ('mitxonline' today).
    tests:
    - not_null
  - name: from_user_id
    description: Raw platform-specific user ID of the source account.
    tests:
    - not_null
  - name: to_platform
    description: Platform identifier of the target account. Same as from_platform
      for a merge redirect; a different platform (e.g. 'edxorg') for a cross-platform
      link.
    tests:
    - not_null
  - name: to_user_id
    description: Raw platform-specific user ID of the target account.
    tests:
    - not_null
  - name: observed_on
    description: Timestamp of the merge (most recent, if reversed). Null for cross-platform
      link rows.
