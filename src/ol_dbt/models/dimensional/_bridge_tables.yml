---
version: 2

models:
- name: bridge_user_courserun_role
  description: >
    User to course run roles bridge across all platforms. Links users to course runs
    via their course access roles (e.g. instructor, staff, beta_tester).
    Grain: one row per (user, course_run, role).
  tests:
  - dbt_utils.unique_combination_of_columns:
      combination_of_columns:
      - user_fk
      - courserun_readable_id
      - courseaccess_role
  columns:
  - name: user_fk
    description: Foreign key to dim_user.user_pk.
    tests:
    - not_null
    - relationships:
        to: ref('dim_user')
        field: user_pk
  - name: courserun_fk
    description: Foreign key to dim_course_run.courserun_pk. Null when the course
      run does not exist in dim_course_run.
    tests:
    - relationships:
        to: ref('dim_course_run')
        field: courserun_pk
  - name: courserun_readable_id
    description: Human-readable course run identifier from the source system. Preserved
      for rows where courserun_fk is null.
    tests:
    - not_null
  - name: courseaccess_role
    description: The role assigned to the user for this course run (e.g. instructor,
      staff, beta_tester, finance_admin, sales_admin).
    tests:
    - not_null

- name: bridge_program_course
  description: >
    Many-to-many bridge table connecting programs to their required courses.
    Allows analysis of program composition and cross-program course sharing.
  tests:
    # Ensure no duplicate program-course pairs
  - dbt_utils.unique_combination_of_columns:
      combination_of_columns:
      - program_fk
      - course_fk
  columns:
  - name: program_fk
    description: Foreign key to dim_program
    tests:
    - not_null
    - relationships:
        to: ref('dim_program')
        field: program_pk
  - name: course_fk
    description: Foreign key to dim_course
    tests:
    - not_null
    - relationships:
        to: ref('dim_course')
        field: course_pk
  - name: is_required
    description: Boolean indicating if course is required for program completion
    tests:
    - not_null
  - name: course_order
    description: Sequence/order of course within program curriculum

- name: bridge_course_instructor
  description: Many-to-many relationship between courses and instructors
  columns:
  - name: course_fk
    description: Foreign key to dim_course
    tests:
    - not_null
    - relationships:
        to: ref('dim_course')
        field: course_pk
  - name: instructor_fk
    description: Foreign key to dim_instructor
    tests:
    - not_null
    - relationships:
        to: ref('dim_instructor')
        field: instructor_pk
  tests:
  - dbt_utils.unique_combination_of_columns:
      combination_of_columns:
      - course_fk
      - instructor_fk

- name: bridge_course_topic
  description: Many-to-many relationship between courses and topics
  columns:
  - name: course_fk
    description: Foreign key to dim_course
    tests:
    - not_null
    - relationships:
        to: ref('dim_course')
        field: course_pk
  - name: topic_fk
    description: Foreign key to dim_topic
    tests:
    - not_null
    - relationships:
        to: ref('dim_topic')
        field: topic_pk
  tests:
  - dbt_utils.unique_combination_of_columns:
      combination_of_columns:
      - course_fk
      - topic_fk

- name: bridge_course_department
  description: Many-to-many relationship between courses and departments
  columns:
  - name: course_fk
    description: Foreign key to dim_course
    tests:
    - not_null
    - relationships:
        to: ref('dim_course')
        field: course_pk
  - name: department_fk
    description: Foreign key to dim_department
    tests:
    - not_null
    - relationships:
        to: ref('dim_department')
        field: department_pk
  tests:
  - dbt_utils.unique_combination_of_columns:
      combination_of_columns:
      - course_fk
      - department_fk
