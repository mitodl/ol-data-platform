---
version: 2

models:
- name: tfact_enrollment
  description: >
    Transaction fact table capturing enrollment events across all platforms.
    Grain: One row per enrollment (course run or program), discriminated by enrollment_type.
  tests:
  - dbt_utils.unique_combination_of_columns:
      combination_of_columns:
      - enrollment_id
      - platform
      - enrollment_type
  columns:
  - name: enrollment_key
    description: >
      Surrogate primary key. Generated from (enrollment_id, platform, enrollment_type).
    tests:
    - unique
    - not_null
  - name: enrollment_id
    description: Source system enrollment ID
    tests:
    - not_null
  - name: enrollment_type
    description: Discriminator — 'course' for course run enrollments, 'program' for
      program enrollments
    tests:
    - not_null
    - accepted_values:
        values: ['course', 'program']
  - name: enrollment_date_key
    description: Foreign key to dim_date for enrollment creation date
    tests:
    - not_null
    - relationships:
        to: ref('dim_date')
        field: date_key
  - name: user_fk
    description: Foreign key to dim_user
    tests:
    - relationships:
        to: ref('dim_user')
        field: user_pk
        where: "user_fk is not null"
        config:
          severity: warn
  - name: courserun_fk
    description: Foreign key to dim_course_run (null for program enrollments)
    tests:
    - relationships:
        to: ref('dim_course_run')
        field: courserun_pk
  - name: program_fk
    description: >
      Foreign key to dim_program. Null for most course enrollments (courserun_fk is
      the relevant key there), but populated for mitxpro course enrollments (enrollment_type
      = 'course') that resulted from a program-purchase order, since xPRO creates
      one
      ProgramEnrollment plus one CourseRunEnrollment per course in the program, sharing
      the same source order — program_fk is recovered via that shared order and reflects
      the program the course was purchased under, not the course's curriculum membership.
      Always populated for program enrollments (enrollment_type = 'program').
    tests:
    - relationships:
        to: ref('dim_program')
        field: program_pk
  - name: platform_fk
    description: Foreign key to dim_platform
    tests:
    - not_null
    - relationships:
        to: ref('dim_platform')
        field: platform_pk
  - name: platform
    description: Platform identifier string
    tests:
    - not_null
  - name: enrollment_is_active
    description: Boolean indicating if enrollment is currently active
  - name: enrollment_mode
    description: Enrollment mode (audit, verified, etc.)
  - name: enrollment_status
    description: Enrollment status
  - name: enrollment_created_on
    description: Enrollment creation timestamp (for incremental processing)
  - name: enrollment_updated_on
    description: Enrollment last-updated timestamp (for incremental processing). Null
      for edxorg and residential platforms.
  - name: enrollment_is_edx_enrolled
    description: >
      Boolean indicating whether the learner is enrolled on the edX side of the platform.
      True for edxorg (always) and residential (always). For mitxonline and mitxpro,
      sourced from the application's edx_enrolled flag. Null for program enrollments
      and bootcamps (not edX-hosted).
  - name: order_id
    description: >
      Source system order ID, read directly off the enrollment record. Only xPRO
      stores this FK on the enrollment itself (mitxonline, bootcamps, edxorg, and
      residential have no order/purchase FK at the source, so this is null for those
      platforms — see tfact_enrollment_order for how order attribution is resolved
      for them instead). This value is authoritative for xPRO regardless of subsequent
      deferral to a different course run or bundling into a program purchase, unlike
      product-based reconstruction, which can't resolve an order for a course run
      that was never itself purchased. Not a unique key on tfact_order (whose grain
      is
      order_id + line_id + platform), so no relationships test is applied here.

- name: tfact_enrollment_order
  description: >
    Resolves which order produced each enrollment. xPRO enrollments carry a direct
    order FK (tfact_enrollment.order_id) which is authoritative even after deferral
    to
    a different course run or bundling into a program purchase. Every other platform
    has no such FK at the source, so their order is reconstructed by matching the
    enrollment's course/program against dim_product, then to tfact_order — fragile
    in
    those same scenarios, but the only signal available for them. Materialized as
    a
    full-table rebuild (not incremental), since tfact_enrollment's own incremental
    watermark has no visibility into order-side changes (refunds, price updates,
    fulfillment).
    Grain: one row per enrollment_key.
  columns:
  - name: enrollment_key
    description: Foreign key to tfact_enrollment.enrollment_key
    tests:
    - unique
    - not_null
    - relationships:
        to: ref('tfact_enrollment')
        field: enrollment_key
  - name: order_fk
    description: >
      Foreign key to tfact_order.order_key for the resolved order line. Consumers
      needing order fields not denormalized onto this table (e.g. order_total_price_paid,
      tax_rate_fk) should join tfact_order on this key rather than tfact_order.order_id,
      since order_id alone is not unique there (tfact_order's grain is order_id +
      line_id + platform) — order_fk points at the specific line this model resolved.
      Null when no order could be resolved (e.g. free/audit enrollments with no
      purchase).
    tests:
    - relationships:
        to: ref('tfact_order')
        field: order_key
        where: "order_fk is not null"
  - name: order_id
    description: Source system order ID for the resolved order. Null when no order
      could be resolved (e.g. free/audit enrollments with no purchase).
  - name: order_reference_number
    description: Order reference/confirmation number for the resolved order
  - name: order_state
    description: Order state (fulfilled or refunded) of the resolved order
  - name: order_updated_on
    description: Last-updated timestamp of the resolved order
  - name: discount_fk
    description: Foreign key to dim_discount for the resolved order
    tests:
    - relationships:
        to: ref('dim_discount')
        field: discount_pk
        where: "discount_fk is not null"
        config:
          severity: warn
  - name: discount_type_fk
    description: Foreign key to dim_discount_type for the resolved order
    tests:
    - relationships:
        to: ref('dim_discount_type')
        field: discount_type_pk
        where: "discount_type_fk is not null"
        config:
          severity: warn
  - name: line_price
    description: Price of the resolved order line, used as unit_price downstream

- name: tfact_order
  description: >
    Transaction fact table for e-commerce order lines across platforms.
    Grain: one row per (order_id, line_id, platform) — one line per product ordered.
    order_total_price_paid is a repeated order-header value and is NOT additive across
    lines of the same order. Use line_price for revenue aggregations.
  tests:
  - dbt_utils.unique_combination_of_columns:
      combination_of_columns:
      - order_id
      - line_id
      - platform
  columns:
  - name: order_key
    description: >
      Surrogate primary key. Generated from (order_id, line_id, platform).
    tests:
    - unique
    - not_null
  - name: order_id
    description: Source system order ID
    tests:
    - not_null
  - name: line_id
    description: Source system order line ID (one line per product in an order)
    tests:
    - not_null
  - name: order_date_key
    description: Foreign key to dim_date for order creation date
    tests:
    - not_null
    - relationships:
        to: ref('dim_date')
        field: date_key
  - name: order_updated_date_key
    description: Foreign key to dim_date for order last update date
    tests:
    - relationships:
        to: ref('dim_date')
        field: date_key
  - name: user_fk
    description: Foreign key to dim_user
    tests:
    - relationships:
        to: ref('dim_user')
        field: user_pk
        where: "user_fk is not null"
        config:
          severity: warn
  - name: platform_fk
    description: Foreign key to dim_platform
    tests:
    - not_null
    - relationships:
        to: ref('dim_platform')
        field: platform_pk
  - name: product_fk
    description: Foreign key to dim_product (current version of the product on this
      line)
    tests:
    - relationships:
        to: ref('dim_product')
        field: product_pk
        where: "product_fk is not null"
        config:
          severity: warn
  - name: discount_fk
    description: >
      Foreign key to dim_discount (null when no discount applied on this line).
      dim_discount is full-refresh and this table is incremental — a
      dim_discount.discount_pk hashing change requires a `dbt run --select
      tfact_order --full-refresh` immediately after to avoid orphaning
      discount_fk on historical order lines.
    tests:
    - relationships:
        to: ref('dim_discount')
        field: discount_pk
        where: "discount_fk is not null"
  - name: platform
    description: Platform identifier string
    tests:
    - not_null
  - name: order_state
    description: Order state (fulfilled, cancelled, etc.)
    tests:
    - not_null
  - name: line_price
    description: Price of the product on this line (additive revenue measure)
  - name: order_total_price_paid
    description: >
      Total amount paid for the entire order. Repeated across all lines of the same
      order —
      NOT additive across lines. Use line_price for revenue aggregations.
  - name: order_total_price_paid_plus_tax
    description: >
      Total amount paid for the entire order plus tax. Repeated across all lines of
      the
      same order — NOT additive across lines.
  - name: order_tax_amount
    description: Total tax amount for the order
  - name: order_tax_rate
    description: Tax rate applied to the order.
  - name: tax_rate_fk
    description: Foreign key to dim_tax_rate (null if tax rate cannot be determined
      or order is not taxable)
    tests:
    - relationships:
        to: ref('dim_tax_rate')
        field: tax_rate_pk
        where: "tax_rate_fk is not null"
  - name: order_reference_number
    description: Order reference/confirmation number
  - name: order_updated_on
    description: Order last update timestamp (for incremental processing)
  - name: discount_type_fk
    description: Foreign key to dim_discount_type; null when no discount was applied
      to this order line

- name: tfact_payment
  description: >
    Transaction fact table for payments/transactions.
    Grain: One row per payment transaction.
  tests:
  - dbt_utils.unique_combination_of_columns:
      combination_of_columns:
      - payment_id
      - platform
  columns:
  - name: payment_key
    description: Surrogate key for payment
    tests:
    - unique
    - not_null
  - name: payment_id
    description: Source system payment/transaction ID
    tests:
    - not_null
  - name: order_id
    description: Associated order ID (for joining to tfact_order)
  - name: payment_date_key
    description: Foreign key to dim_date for payment date
    tests:
    - not_null
    - relationships:
        to: ref('dim_date')
        field: date_key
  - name: user_fk
    description: >
      Foreign key to dim_user, resolved via the payment's order_id → tfact_order →
      dim_user chain. Null when no matching order exists for the payment or when the
      order cannot be mapped to a user in dim_user.
  - name: platform_fk
    description: Foreign key to dim_platform
    tests:
    - not_null
    - relationships:
        to: ref('dim_platform')
        field: platform_pk
  - name: platform
    description: Platform identifier string
    tests:
    - not_null
  - name: payment_method_fk
    description: >
      Foreign key to dim_payment_method. NULL for refund transactions and zero-dollar
      payments where Cybersource does not return a req_payment_method value.
    tests:
    - relationships:
        to: ref('dim_payment_method')
        field: payment_method_pk
        where: "payment_method_fk is not null"
  - name: transaction_amount
    description: Transaction amount (additive measure)
  - name: transaction_type
    description: Type of transaction (payment, refund, etc.)
  - name: transaction_status
    description: Transaction status (success, failed, pending)
  - name: transaction_created_on
    description: Transaction creation timestamp (for incremental processing)

- name: tfact_certificate
  description: >
    Transaction fact table for certificate issuance events.
    Grain: One row per certificate issued (course or program).
  tests:
  - dbt_utils.unique_combination_of_columns:
      combination_of_columns:
      - certificate_id
      - platform
      - certificate_scope
  columns:
  - name: certificate_key
    description: Surrogate key for certificate
    tests:
    - unique
    - not_null
  - name: certificate_id
    description: Source system certificate ID
    tests:
    - not_null
  - name: certificate_issued_date_key
    description: Foreign key to dim_date for certificate issuance date. Very small
      number of program certificates have null issued dates in edx.org source data
    tests:
    - relationships:
        to: ref('dim_date')
        field: date_key
  - name: user_fk
    description: Foreign key to dim_user
    tests:
    - relationships:
        to: ref('dim_user')
        field: user_pk
        where: "user_fk is not null"
        config:
          severity: warn
  - name: courserun_fk
    description: Foreign key to dim_course_run (null for program certificates)
    tests:
    - relationships:
        to: ref('dim_course_run')
        field: courserun_pk
        where: "courserun_fk is not null"
        config:
          severity: warn
  - name: program_fk
    description: Foreign key to dim_program (null for course certificates)
    tests:
    - relationships:
        to: ref('dim_program')
        field: program_pk
        where: "program_fk is not null"
        config:
          severity: warn
  - name: platform_fk
    description: Foreign key to dim_platform
    tests:
    - not_null
    - relationships:
        to: ref('dim_platform')
        field: platform_pk
  - name: certificate_type_fk
    description: Foreign key to dim_certificate_type
    tests:
    - relationships:
        to: ref('dim_certificate_type')
        field: certificate_type_pk
  - name: platform
    description: Platform identifier string
    tests:
    - not_null
  - name: certificate_scope
    description: Scope of certificate - 'course' for course run certificates, 'program'
      for program certificates
    tests:
    - not_null
    - accepted_values:
        values: ['course', 'program']
  - name: certificate_uuid
    description: Universally unique identifier for certificate
  - name: certificate_is_revoked
    description: Boolean indicating if certificate has been revoked
    tests:
    - not_null
  - name: certificate_created_on
    description: Certificate creation timestamp (for incremental processing)
  - name: certificate_updated_on
    description: Certificate last update timestamp (for incremental processing)
  - name: certificate_issued_on
    description: Certificate issuance timestamp. For MITx Online, this is the actual
      issued_on date from the source system. For other platforms, this falls back
      to created_on as they don't track a separate issued date.

- name: tfact_grade
  description: >
    Transaction fact table for course run grade records.
    Grain: One row per (user × course run) grade, across MITx Online, MITx Pro, and
    edX.org.
    edX.org rows include MicroMasters-linked grades (micromasters_program_id IS NOT
    NULL);
    a separate MicroMasters platform source may be added in a future phase.
    Note: edX.org grade timestamps are unavailable in source data; grade_date_key
    and
    grade_created_on are null for edX.org rows.
  tests:
  - dbt_utils.unique_combination_of_columns:
      combination_of_columns:
      - grade_id
      - platform
  columns:
  - name: grade_key
    description: Surrogate key for grade record
    tests:
    - unique
    - not_null
  - name: grade_id
    description: >
      Source system grade ID. Integer-cast courserungrade_id for MITx Online and MITx
      Pro;
      surrogate key from (user_id, courserun_readable_id) for edX.org.
    tests:
    - not_null
  - name: grade_date_key
    description: >
      Foreign key to dim_date for grade creation date (YYYYMMDD integer).
      Null for edX.org rows where grade timestamps are unavailable.
    tests:
    - relationships:
        to: ref('dim_date')
        field: date_key
        where: "grade_date_key is not null"
  - name: user_fk
    description: Foreign key to dim_user
    tests:
    - relationships:
        to: ref('dim_user')
        field: user_pk
        where: "user_fk is not null"
        config:
          severity: warn
  - name: courserun_fk
    description: Foreign key to dim_course_run
    tests:
    - relationships:
        to: ref('dim_course_run')
        field: courserun_pk
        where: "courserun_fk is not null"
        config:
          severity: warn
  - name: platform_fk
    description: Foreign key to dim_platform
    tests:
    - not_null
    - relationships:
        to: ref('dim_platform')
        field: platform_pk
  - name: platform
    description: Platform identifier string (mitxonline, mitxpro, edxorg)
    tests:
    - not_null
    - accepted_values:
        values: ['mitxonline', 'mitxpro', 'edxorg']
  - name: grade_value
    description: Numeric grade value between 0.0 and 1.0
  - name: is_passing
    description: Boolean indicating whether the learner passed the course run
  - name: letter_grade
    description: >
      Letter grade string (e.g. 'Pass', 'Fail'). Available for MITx Online and MITx
      Pro only;
      null for edX.org.
  - name: grade_created_on
    description: Grade creation timestamp (for incremental processing). Null for edX.org.
  - name: grade_updated_on
    description: Grade last update timestamp (for incremental processing). Null for
      edX.org.
