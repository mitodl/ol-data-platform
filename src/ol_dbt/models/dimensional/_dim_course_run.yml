---
version: 2

models:
- name: dim_course_run
  description: >
    Specific course offering/run dimension (SCD Type 2). One course (dim_course) may
    have
    multiple runs over time. This dimension captures the specific instance of a course
    with start/end dates, enrollment windows, etc.
  tests:
  - dbt_utils.unique_combination_of_columns:
      combination_of_columns:
      - platform
      - courserun_readable_id
      - is_current
      where: "is_current = true"
  columns:
  - name: courserun_pk
    description: >
      Surrogate primary key. Generated as dbt_utils.generate_surrogate_key(['platform',
      'courserun_readable_id']). Value is stable across SCD2 versions — the same
      courserun_pk appears on both current and historical rows. Always filter with
      is_current=true when looking up by this key.
    tests:
    - not_null
  - name: courserun_readable_id
    description: Business key - unique identifier for course run
    tests:
    - not_null
  - name: course_fk
    description: >
      Foreign key to dim_course. Null when no matching course exists in dim_course
      —
      edxorg runs attempt a join (extracting course_readable_id from courserun_readable_id)
      but will be null until edxorg courses are loaded. Non-edxorg nulls indicate
      courses not yet in dim_course.
    tests:
    - not_null:
        where: "platform != 'edxorg'"
        config:
          severity: warn
    - relationships:
        to: ref('dim_course')
        field: course_pk
        where: "platform != 'edxorg' and course_fk is not null"
  - name: platform_fk
    description: Foreign key to dim_platform (Phase 3+)
  - name: platform
    description: Platform identifier string
    tests:
    - not_null
  - name: courserun_title
    description: Title of this specific course run
  - name: courserun_start_date_key
    description: Foreign key to dim_date for course run start date
    tests:
    - relationships:
        to: ref('dim_date')
        field: date_key
        where: "courserun_start_date_key is not null and courserun_start_date_key\
          \ <= 20301231"
  - name: courserun_end_date_key
    description: Foreign key to dim_date for course run end date
    tests:
    - relationships:
        to: ref('dim_date')
        field: date_key
        where: "courserun_end_date_key is not null and courserun_end_date_key <= 20301231"
  - name: enrollment_start_date_key
    description: Foreign key to dim_date for enrollment period start
  - name: enrollment_end_date_key
    description: Foreign key to dim_date for enrollment period end
  - name: courserun_is_live
    description: Boolean indicating if course run is live
  - name: effective_date
    description: >
      Timestamp (UTC) when this SCD Type 2 version became effective. Always set for
      the current record. Filter with is_current to get the active version.
    tests:
    - not_null
  - name: end_date
    description: >
      Timestamp (UTC) when this SCD Type 2 version was superseded. Null for the current
      active record.
  - name: is_current
    description: Boolean indicating current version
    tests:
    - not_null
  - name: courserun_start_on
    description: timestamp, the start date/time of the course run (raw timestamp column)
  - name: courserun_end_on
    description: timestamp, the end date/time of the course run (raw timestamp column)
  - name: enrollment_start
    description: timestamp, the start of the enrollment window for this course run
  - name: enrollment_end
    description: timestamp, the end of the enrollment window for this course run
  - name: source_id
    description: string, source system identifier for this course run record
