---
version: 2

models:
- name: irx__mitxonline__openedx__mysql__user_id_map
  description: Mapping of users to to anonymous ID
  config:
    grants:
      select: ['mit_irx']
  columns:
  - name: hash_id
    description: str, persistent anonymous_user_id of the learner from the student_anonymoususerid
      cache table
  - name: user_id
    description: int, id of the learner from the auth_user table
  - name: username
    description: str, username of the learner from the auth_user table

- name: irx__mitxonline__openedx__mysql__teams
  description: Stores unique course teams
  config:
    grants:
      select: ['mit_irx']
  columns:
  - name: team_size
    description: int, the number of users in a team
  - name: description
    description: string, the description of the team
  - name: team_id
    description: string, the unique id of the team

- name: irx__mitxonline__openedx__mysql__teams_membership
  description: Stores data on unique user and course team relationships.
  config:
    grants:
      select: ['mit_irx']
  columns:
  - name: id
    description: int, the auto-incremented ID for this table
  - name: user_id
    description: int, foreign key to the users_user table
  - name: team_id
    description: string, the unique id of the team

- name: irx__mitxonline__openedx__mysql__student_courseenrollment
  description: Stores the mapping of students to the courses they are enrolled in.
  config:
    grants:
      select: ['mit_irx']
  columns:
  - name: course_id
    description: string, unique ID representing a single MITx Online course run
  - name: mode
    description: string, the mode in which the user took the course (eg. audit)
  - name: id
    description: int, the auto-incremented ID for this table
  - name: is_active
    description: boolean, whether the user has been active in a course

- name: irx__mitxonline__openedx__mysql__grades_persistentcoursegrade
  description: MITx Online open edX course grades
  config:
    grants:
      select: ['mit_irx']
  columns:
  - name: course_id
    description: str, Open edX Course Key e.g. course-v1:org+course+run (for new-type
      courses) or org/course/run (for old-type courses)
  - name: user_id
    description: int, user ID on Residential xPro open edx platform
  - name: grading_policy_hash
    description: str, A SHA-1 digest of the course grading policy, used to detect
      and update grades whenever the policy changes
  - name: percent_grade
    description: float, calculated course grade as a decimal percentage, per grading
      policy. e.g. 0.91 means 91%
  - name: letter_grade
    description: str, calculated course grade as a letter value (e.g., A-D, Pass),
      per grading policy If the learner's grade is Fail or F, this value is empty.
  - name: passed_timestamp
    description: timestamp, date and time when the learner first passed the course.
      If this value is empty, the learner never passed the course. If this value is
      non-empty but the letter_grade value is empty, the learner transitioned from
      passing to not passing.
  - name: created
    description: timestamp, date and time when this grade was initially created
  - name: modified
    description: timestamp, date and time when this grade was most recently updated

- name: irx__mitxonline__openedx__mysql__grades_persistentsubsectiongrade
  description: Stores data on unique user and course team relationships.
  config:
    grants:
      select: ['mit_irx']
  columns:
  - name: course_id
    description: str, Open edX Course ID formatted as course-v1:{org}+{course code}+{run_tag}
  - name: user_id
    description: int, foreign key to auth_user from open edX platform
  - name: usage_key
    description: str, block ID of the subsection (sequential) - foreign key to course_structure.
      e.g. block-v1:{org}+{course}+{run}type@{block type}+block@{hash code}
  - name: earned_all
    description: float, The user's aggregated "total_weighted_earned" score in the
      subsection, calculated by summing all "weighted_earned" values of all (graded
      and ungraded) problems in the subsection.
  - name: possible_all
    description: float, the aggregated "total_weighted_possible" score in the subsection,
      calculated by summing all "weighted_possible" values of all (graded and ungraded)
      problems in the subsection.
  - name: earned_graded
    description: float, The user's aggregated "total_weighted_earned" score in the
      subsection, calculated by summing all "weighted_earned" values of all "graded"
      problems in the subsection.
  - name: possible_graded
    description: float, The aggregated "total_weighted_possible" score in the subsection,
      calculated by summing all "weighted_possible" values of all "graded" problems
      in the subsection.
  - name: first_attempted
    description: timestamp, time of the user's first attempt at a problem in the subsection.
  - name: created
    description: timestamp, datetime of the subsection grade was first calculated
      for this user for this subsection.
  - name: modified
    description: timestamp, datetime of the subsection grade was last updated for
      this user for this subsection. It will be updated every time the user attempts
      the problem.

- name: irx__mitxonline__openedx__mysql__auth_user
  description: Stores data on unique user and course team relationships.
  config:
    grants:
      select: ['mit_irx']
  columns:
  - name: id
    description: int, sequential ID representing a user on MITx Online open edX platform
  - name: username
    description: str, unique username on the open edX platform
  - name: first_name
    description: str, user's first name. This field is not populated on production.
  - name: last_name
    description: str, user's last name. This field is not populated on production.
  - name: email
    description: str, user's email associated with their account
  - name: pass_word
    description: str, hashed password
  - name: is_staff
    description: boolean, indicating whether user can log into admin site
  - name: is_active
    description: boolean, used to soft delete users
  - name: is_superuser
    description: boolean, indicating whether user has all permissions on open edx
      platform
  - name: last_login
    description: timestamp, date and time when user last login on the open edX platform
  - name: date_joined
    description: timestamp, date and time when a user account was initially created
      on the open edX platform
      # TODO: update the descriptions, check email_key type
  - name: status
    description: string, status
  - name: email_key
    description: string, email_key
  - name: avatar_type
    description: string, avatar_type
  - name: country
    description: string, country
  - name: show_country
    description: int, show_country
  - name: date_of_birth
    description: timestamp, date_of_birth
  - name: interesting_tags
    description: string, interesting_tags
  - name: ignored_tags
    description: string, ignored_tags
  - name: email_tag_filter_strategy
    description: int, email_tag_filter_strategy
  - name: display_tag_filter_strategy
    description: int, display_tag_filter_strategy
  - name: consecutive_days_visit_count
    description: int, consecutive_days_visit_count

- name: irx__mitxonline__openedx__bigquery__email_opt_in
  description: Stores data on the email preferences of unique users.
  config:
    grants:
      select: ['mit_irx']
  columns:
  - name: openedx_user_id
    description: int, unique ID for each user on the MITx Online open edX platform
  - name: user_full_name
    description: str, user full name
  - name: user_username
    description: str, name chosen by user and used for login
  - name: user_email
    description: str, user email associated with their account
  - name: courserun_readable_id
    description: string, unique ID representing a single MITx Online course run
  - name: courserun_title
    description: str, title of the course run
  - name: email_opted_in
    description: int, if this field is 0 then we've recieved an email optout otherwise
      it will be 1

- name: irx__mitxonline__openedx__mysql__assessment_assessment
  description: Peer assessments submitted for open response assessment submissions
    in MITx Online OpenedX
  config:
    grants:
      select: ['mit_irx']
  columns:
  - name: scorer_id
    description: string, the anonymous student ID of the scorer
  - name: id
    description: int, auto-incremented ID for this table
  - name: score_type
    description: string, the type of score - peer, self, etc.

- name: irx__mitxonline__openedx__mysql__assessment_assessmentfeedback
  description: Feedback submitted by learners after completing peer assessment in
    MITx Online OpenedX
  config:
    grants:
      select: ['mit_irx']
  columns:
  - name: id
    description: int, auto-incremented ID for this table
  - name: submission_uuid
    description: string, UUID of the original submission
  - name: feedback_text
    description: string, free-text feedback from the learner

- name: irx__mitxonline__openedx__mysql__assessment_assessmentfeedback_assessments
  description: Junction table linking assessment feedback to assessments in MITx Online
    OpenedX
  config:
    grants:
      select: ['mit_irx']
  columns:
  - name: assessment_id
    description: int, foreign key to assessment_assessment
  - name: assessmentfeedback_id
    description: int, foreign key to assessment_assessmentfeedback
  - name: id
    description: int, auto-incremented ID for this table

- name: irx__mitxonline__openedx__mysql__assessment_assessmentfeedback_options
  description: Junction table linking assessment feedback to selected feedback options
    in MITx Online OpenedX
  config:
    grants:
      select: ['mit_irx']
  columns:
  - name: assessmentfeedbackoption_id
    description: int, foreign key to assessment_assessmentfeedbackoption
  - name: assessmentfeedback_id
    description: int, foreign key to assessment_assessmentfeedback
  - name: id
    description: int, auto-incremented ID for this table

- name: irx__mitxonline__openedx__mysql__assessment_assessmentfeedbackoption
  description: Predefined options that learners can select when giving feedback on
    assessments in MITx Online OpenedX
  config:
    grants:
      select: ['mit_irx']
  columns:
  - name: text
    description: string, the text of the feedback option
  - name: id
    description: int, auto-incremented ID for this table

- name: irx__mitxonline__openedx__mysql__assessment_assessmentpart
  description: Individual criterion scores within a peer assessment in MITx Online
    OpenedX
  config:
    grants:
      select: ['mit_irx']
  columns:
  - name: assessment_id
    description: int, foreign key to assessment_assessment
  - name: option_id
    description: int, foreign key to the criterion option selected
  - name: id
    description: int, auto-incremented ID for this table
  - name: feedback
    description: string, free-text feedback for this criterion

- name: irx__mitxonline__openedx__mysql__assessment_peerworkflow
  description: Tracks progress of a learner through the peer assessment workflow in
    MITx Online OpenedX
  config:
    grants:
      select: ['mit_irx']
  columns:
  - name: cancelled_at
    description: timestamp, when the workflow was cancelled
  - name: grading_completed_at
    description: timestamp, when all grading was completed
  - name: student_id
    description: string, anonymous student ID
  - name: course_id
    description: string, unique ID representing a single MITx Online course run

- name: irx__mitxonline__openedx__mysql__assessment_peerworkflowitem
  description: Individual peer review assignments within a peer workflow in MITx Online
    OpenedX
  config:
    grants:
      select: ['mit_irx']
  columns:
  - name: started_at
    description: timestamp, when this peer review was started
  - name: assessment_id
    description: int, foreign key to assessment_assessment
  - name: author_id
    description: string, anonymous student ID of the submission author
  - name: id
    description: int, auto-incremented ID for this table

- name: irx__mitxonline__openedx__mysql__assessment_studenttrainingworkflow
  description: Tracks a learner's progress through student training examples in MITx
    Online OpenedX
  config:
    grants:
      select: ['mit_irx']
  columns:
  - name: student_id
    description: string, anonymous student ID of the learner
  - name: course_id
    description: string, unique ID representing a single MITx Online course run
  - name: id
    description: int, auto-incremented ID for this table
  - name: item_id
    description: string, the item ID within the course

- name: irx__mitxonline__openedx__mysql__assessment_studenttrainingworkflowitem
  description: Individual training example review assignments in a student training
    workflow in MITx Online OpenedX
  config:
    grants:
      select: ['mit_irx']
  columns:
  - name: workflow_id
    description: int, foreign key to assessment_studenttrainingworkflow
  - name: order_num
    description: int, order of this training item within the workflow
  - name: started_at
    description: timestamp, when this training item was started
  - name: id
    description: int, auto-incremented ID for this table

- name: irx__mitxonline__openedx__mysql__auth_userprofile
  description: User profile information for MITx Online OpenedX learners enrolled
    in at least one course
  config:
    grants:
      select: ['mit_irx']
  columns:
  - name: id
    description: int, auto-incremented ID for this table
  - name: user_id
    description: int, foreign key to auth_user
  - name: name
    description: string, full name of the learner
  - name: language
    description: string, preferred language of the learner
  - name: location
    description: string, location of the learner
  - name: meta
    description: string, JSON metadata
  - name: courseware
    description: string, courseware identifier
  - name: gender
    description: string, gender of the learner
  - name: mailing_address
    description: string, mailing address
  - name: year_of_birth
    description: int, year of birth
  - name: level_of_education
    description: string, highest level of education
  - name: goals
    description: string, learner goals
  - name: country
    description: string, country of the learner
  - name: city
    description: string, city of the learner
  - name: bio
    description: string, learner biography
  - name: profile_image_uploaded_at
    description: timestamp, when the profile image was uploaded
  - name: state
    description: string, state or province

- name: irx__mitxonline__openedx__mysql__certificates_generatedcertificate
  description: Generated course certificates for MITx Online OpenedX learners, deduplicated
    to most recent record
  config:
    grants:
      select: ['mit_irx']
  columns:
  - name: id
    description: int, auto-incremented ID for this table
  - name: user_id
    description: int, foreign key to auth_user
  - name: course_id
    description: string, unique ID representing a single MITx Online course run
  - name: key
    description: string, unique certificate key
  - name: name
    description: string, name on the certificate
  - name: distinction
    description: boolean, whether the certificate has distinction
  - name: verify_uuid
    description: string, UUID for certificate verification
  - name: download_uuid
    description: string, UUID for certificate download
  - name: download_url
    description: string, URL to download the certificate
  - name: grade
    description: string, grade achieved
  - name: created_date
    description: timestamp, when the certificate was created
  - name: modified_date
    description: timestamp, when the certificate was last modified
  - name: mode
    description: string, the course mode e.g. verified
  - name: status
    description: string, certificate status
  - name: error_reason
    description: string, reason for any error in certificate generation

- name: irx__mitxonline__openedx__mysql__course_groups_cohortmembership
  description: Cohort group memberships for MITx Online OpenedX learners
  config:
    grants:
      select: ['mit_irx']
  columns:
  - name: user_id
    description: int, foreign key to auth_user
  - name: course_id
    description: string, unique ID representing a single MITx Online course run
  - name: group_type
    description: string, the type of user group
  - name: name
    description: string, name of the cohort group

- name: irx__mitxonline__openedx__mysql__credit_crediteligibility
  description: Credit eligibility records for MITx Online OpenedX learners
  config:
    grants:
      select: ['mit_irx']
  columns:
  - name: id
    description: int, auto-incremented ID for this table
  - name: created
    description: timestamp, when the eligibility was created
  - name: modified
    description: timestamp, when the eligibility was last modified
  - name: username
    description: string, username of the eligible learner
  - name: deadline
    description: timestamp, deadline to claim credit
