- name: irx__mitxonline__openedx__mysql__django_comment_client_role_users
  description: Discussion forum role assignments for MITx Online OpenedX learners
  config:
    grants:
      select: ['mit_irx']
  columns:
  - name: course_id
    description: string, unique ID representing a single MITx Online course run
  - name: user_id
    description: int, foreign key to auth_user
  - name: name
    description: string, name of the discussion role e.g. Moderator

- name: irx__mitxonline__openedx__mysql__student_anonymoususerid
  description: Mapping of MITx Online OpenedX learners to their anonymous user IDs
    per course
  config:
    grants:
      select: ['mit_irx']
  columns:
  - name: anonymous_user_id
    description: string, the anonymous user ID for this learner in this course
  - name: course_id
    description: string, unique ID representing a single MITx Online course run
  - name: id
    description: int, auto-incremented ID for this table

- name: irx__mitxonline__openedx__mysql__student_courseaccessrole
  description: Course staff and instructor role assignments in MITx Online OpenedX
  config:
    grants:
      select: ['mit_irx']
  columns:
  - name: org
    description: string, organization identifier
  - name: course_id
    description: string, unique ID representing a single MITx Online course run
  - name: user_id
    description: int, foreign key to auth_user
  - name: role
    description: string, the role name e.g. instructor, staff

- name: irx__mitxonline__openedx__mysql__student_languageproficiency
  description: Language proficiency records for MITx Online OpenedX learners enrolled
    in at least one course
  config:
    grants:
      select: ['mit_irx']
  columns:
  - name: user_profile_id
    description: int, foreign key to auth_userprofile
  - name: id
    description: int, auto-incremented ID for this table
  - name: code
    description: string, BCP-47 language code

- name: irx__mitxonline__openedx__mysql__submissions_score
  description: Scores for open response assessment submissions in MITx Online OpenedX
  config:
    grants:
      select: ['mit_irx']
  columns:
  - name: points_earned
    description: int, points earned on this submission
  - name: reset
    description: boolean, whether the score was reset
  - name: submission_id
    description: int, foreign key to submissions_submission
  - name: id
    description: int, auto-incremented ID for this table
  - name: student_item_id
    description: int, foreign key to submissions_studentitem

- name: irx__mitxonline__openedx__mysql__submissions_scoresummary
  description: Summary of highest and latest scores for student items in MITx Online
    OpenedX
  config:
    grants:
      select: ['mit_irx']
  columns:
  - name: highest_id
    description: int, foreign key to submissions_score for the highest score
  - name: id
    description: int, auto-incremented ID for this table
  - name: latest_id
    description: int, foreign key to submissions_score for the latest score
  - name: student_item_id
    description: int, foreign key to submissions_studentitem

- name: irx__mitxonline__openedx__mysql__submissions_studentitem
  description: Student items representing individual assessment submissions in MITx
    Online OpenedX
  config:
    grants:
      select: ['mit_irx']
  columns:
  - name: student_id
    description: string, anonymous student ID of the learner
  - name: course_id
    description: string, unique ID representing a single MITx Online course run
  - name: id
    description: int, auto-incremented ID for this table
  - name: item_id
    description: string, the item ID within the course

- name: irx__mitxonline__openedx__mysql__submissions_submission
  description: Open response assessment submissions in MITx Online OpenedX, filtered
    to enrolled students
  config:
    grants:
      select: ['mit_irx']
  columns:
  - name: team_submission_id
    description: string, team submission UUID if this is a team submission
  - name: submitted_at
    description: timestamp, when the submission was submitted
  - name: status
    description: string, status of the submission
  - name: id
    description: int, auto-incremented ID for this table

- name: irx__mitxonline__openedx__mysql__user_api_usercoursetag
  description: User-specific tags within a course context in MITx Online OpenedX
  config:
    grants:
      select: ['mit_irx']
  columns:
  - name: course_id
    description: string, unique ID representing a single MITx Online course run
  - name: id
    description: int, auto-incremented ID for this table
  - name: user_id
    description: int, foreign key to auth_user

- name: irx__mitxonline__openedx__mysql__workflow_assessmentworkflow
  description: Top-level assessment workflow state for each learner submission in
    MITx Online OpenedX, deduplicated to most recent record
  config:
    grants:
      select: ['mit_irx']
  columns:
  - name: course_id
    description: string, unique ID representing a single MITx Online course run
  - name: status
    description: string, current status of the assessment workflow
  - name: modified
    description: timestamp, when the workflow was last modified
  - name: id
    description: int, auto-incremented ID for this table

- name: irx__mitxonline__openedx__mysql__workflow_assessmentworkflowstep
  description: Individual step states within an assessment workflow in MITx Online
    OpenedX
  config:
    grants:
      select: ['mit_irx']
  columns:
  - name: workflow_id
    description: int, foreign key to workflow_assessmentworkflow
  - name: skipped
    description: boolean, whether this step was skipped
  - name: order_num
    description: int, order of this step in the workflow
  - name: assessment_completed_at
    description: timestamp, when this step's assessment was completed
