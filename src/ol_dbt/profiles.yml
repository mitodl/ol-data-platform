---
open_learning:
  target: dev_local
  outputs:
    qa:
      type: trino
      method: ldap
      user: '{{ env_var("DBT_TRINO_USERNAME") }}'
      password: '{{ env_var("DBT_TRINO_PASSWORD") }}'
      database: ol_data_lake_qa
      port: 443
      schema: ol_warehouse_qa
      host: mitol-ol-data-lake-qa-0.trino.galaxy.starburst.io
      http_scheme: https
      threads: 4
    production:
      type: trino
      method: ldap
      user: '{{ env_var("DBT_TRINO_USERNAME") }}'
      password: '{{ env_var("DBT_TRINO_PASSWORD") }}'
      database: ol_data_lake_production
      port: 443
      schema: ol_warehouse_production
      host: mitol-ol-data-lake-production.trino.galaxy.starburst.io
      http_scheme: https
      threads: 4
    dev_qa:
      type: trino
      method: oauth
      database: ol_data_lake_qa
      port: 443
      schema: ol_warehouse_qa{{ "_{}".format(var('schema_suffix')) }}
      host: mitol-ol-data-lake-qa-0.trino.galaxy.starburst.io
      http_scheme: https
      threads: 4
    dev_production:
      type: trino
      method: oauth
      database: ol_data_lake_production
      port: 443
      schema: ol_warehouse_production{{ "_{}".format(var('schema_suffix')) }}
      host: mitol-ol-data-lake-production.trino.galaxy.starburst.io
      http_scheme: https
      threads: 4
    dev:
      type: duckdb
      path: dev_dbs/dev.duckdb
    dev_local:
      type: duckdb
      path: '{{ env_var("HOME") }}/.ol-dbt/local.duckdb'
      schema: main
      threads: 4
      use_credential_provider: aws
      extensions:
      - httpfs
      - aws
      - iceberg
      config_options:
        temp_directory: '{{ env_var("HOME") }}/.ol-dbt/temp'
      settings:
        memory_limit: '{{ env_var("DBT_DUCKDB_MEMORY_LIMIT", "28GB") }}'
        enable_http_metadata_cache: true
        preserve_insertion_order: false
    dev_local_iceberg:
      type: duckdb
      path: ':memory:'
      threads: 4
      extensions:
      - httpfs
      - aws
      - iceberg
      config_options:
        temp_directory: '{{ env_var("HOME") }}/.ol-dbt/temp'
      settings:
        memory_limit: '{{ env_var("DBT_DUCKDB_MEMORY_LIMIT", "16GB") }}'
        enable_http_metadata_cache: true
        s3_region: '{{ env_var("AWS_DEFAULT_REGION", "us-east-1") }}'
        s3_access_key_id: '{{ env_var("AWS_ACCESS_KEY_ID", "") }}'
        s3_secret_access_key: '{{ env_var("AWS_SECRET_ACCESS_KEY", "") }}'
    starrocks_qa:
      type: starrocks
      host: '{{ env_var("DBT_STARROCKS_HOST", "lakehouse.qa.starrocks.ol.mit.edu")
        }}'
      port: 9030
      database: default_catalog
      schema: '{{ env_var("DBT_STARROCKS_SCHEMA", "b2b_analytics") }}'
      username: '{{ env_var("DBT_STARROCKS_OIDC_USERNAME") }}'
      password: '{{ env_var("DBT_STARROCKS_OIDC_TOKEN") }}'
      auth_plugin: mysql_clear_password
      threads: 4
    starrocks_qa_vault:
      type: starrocks
      host: '{{ env_var("DBT_STARROCKS_HOST", "127.0.0.1") }}'
      port: 9030
      database: default_catalog
      schema: '{{ env_var("DBT_STARROCKS_SCHEMA", "b2b_analytics") }}'
      username: '{{ env_var("DBT_STARROCKS_USERNAME") }}'
      password: '{{ env_var("DBT_STARROCKS_PASSWORD") }}'
      threads: 4
    # Namespaced counterparts of starrocks_qa_vault / starrocks_production,
    # mirroring the Trino dev_qa / dev_production pattern: the bare targets
    # above are the shared, unsuffixed schemas used by scheduled/production
    # builds, while these append schema_suffix so interactive dev runs and
    # concurrent CI runs against the same shared cluster don't collide with
    # each other or with the real qa-tier data.
    starrocks_dev_qa_vault:
      type: starrocks
      host: '{{ env_var("DBT_STARROCKS_HOST", "127.0.0.1") }}'
      port: 9030
      database: default_catalog
      schema: '{{ env_var("DBT_STARROCKS_SCHEMA", "b2b_analytics") }}_{{ var("schema_suffix")
        }}'
      username: '{{ env_var("DBT_STARROCKS_USERNAME") }}'
      password: '{{ env_var("DBT_STARROCKS_PASSWORD") }}'
      threads: 4
    starrocks_ci:
      type: starrocks
      host: '{{ env_var("DBT_STARROCKS_HOST", "lakehouse.ci.starrocks.ol.mit.edu")
        }}'
      port: 9030
      database: default_catalog
      schema: '{{ env_var("DBT_STARROCKS_SCHEMA", "b2b_analytics") }}_{{ var("schema_suffix")
        }}'
      username: '{{ env_var("DBT_STARROCKS_USERNAME") }}'
      password: '{{ env_var("DBT_STARROCKS_PASSWORD") }}'
      threads: 4
    starrocks_production:
      type: starrocks
      host: '{{ env_var("DBT_STARROCKS_HOST", "lakehouse-starrocks-fe-service.starrocks.svc.cluster.local")
        }}'
      port: 9030
      database: default_catalog
      schema: '{{ env_var("DBT_STARROCKS_SCHEMA", "b2b_analytics") }}'
      username: '{{ env_var("DBT_STARROCKS_USERNAME") }}'
      password: '{{ env_var("DBT_STARROCKS_PASSWORD") }}'
      threads: 4
