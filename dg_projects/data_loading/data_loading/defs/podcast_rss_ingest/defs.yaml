type: dagster_dlt.DltLoadCollectionComponent

attributes:
  loads:
    - source: .loads.podcast_rss_load_source
      pipeline: .loads.podcast_rss_pipeline
      translation:
        group_name: ingestion
        key: "{{ resource.name }}"
        key_prefix: "ol_warehouse_raw_data"
        description: "Raw podcast data ingested from MIT Learn podcast RSS feeds configured in mitodl/open-podcast-data."
