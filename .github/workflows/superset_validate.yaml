---
name: Superset validate

# Credential-free PR gate for the exported Superset assets (src/ol_superset/assets):
# YAML syntax, dashboard → chart → dataset UUID chains, chart↔dataset column-case
# consistency (Trino lowercases identifiers), governance-role schema coverage, and
# the Dataset → dbt-model chain (--dbt-dir): every physical Trino dataset must map to
# a real dbt model. Reads only checked-in files (dbt registry is parsed statically
# from models/_*.yml) — no Superset/warehouse connection.

permissions:
  contents: read

on:
  pull_request:
    paths:
    - "src/ol_superset/**"
    # dbt model renames/removals can orphan a Superset dataset, so re-validate on those too.
    - "src/ol_dbt/**"
    - ".github/workflows/superset_validate.yaml"
  workflow_dispatch:

jobs:
  validate:
    name: ol-superset validate
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Install uv
      uses: astral-sh/setup-uv@v8.3.2
      with:
        version: "0.11.26"
        enable-cache: true

    - name: Set up Python
      run: uv python install 3.13

    - name: Install ol-superset
      working-directory: src/ol_superset
      run: uv sync --all-extras

    # Full validation including the Dataset → dbt-model chain. Fails (exit 1) on any
    # physical Trino dataset whose backing dbt model is missing/renamed — which
    # surfaces datasets pointing at stale, unmaintained warehouse tables.
    - name: Validate Superset assets
      working-directory: src/ol_superset
      run: uv run ol-superset validate --dbt-dir ../ol_dbt
